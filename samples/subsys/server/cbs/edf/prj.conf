CONFIG_SYS_CLOCK_TICKS_PER_SEC=10000
CONFIG_SCHED_DEADLINE=y

CONFIG_CBS=y
CONFIG_CBS_LOG=y

# we only want logs for budget replenishing, 
# so let's disable the others:
CONFIG_CBS_LOG_JOB_PUSH=n
CONFIG_CBS_LOG_JOB_COMPLETE=n
CONFIG_CBS_LOG_SWITCHED_IN=n
CONFIG_CBS_LOG_SWITCHED_OUT=n

